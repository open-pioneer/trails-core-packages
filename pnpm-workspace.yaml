packages:
  - src/**
  - "!**/test-data/**"
  - "!**/dist/**"

# https://pnpm.io/catalogs
catalog:
  # Frontend dependencies
  "@ark-ui/react": "^5.34.0" # Note: only needed in chakra-snippets, can (maybe) be removed in the future
  "@chakra-ui/cli": ^3.34.0
  "@chakra-ui/react": ^3.34.0
  "@conterra/reactivity-core": ^0.8.5
  "@conterra/reactivity-events": ^0.8.5
  "@emotion/cache": ^11.14.0
  "@emotion/react": ^11.14.0
  "@formatjs/intl": ^4.1.11
  classnames: ^2.5.1
  keycloak-js: ^26.2.4
  react-dom: ^19.2.6
  react-icons: ^5.6.0
  react-use: ^17.6.0
  react: ^19.2.6

  # Samples only
  react-json-view: ^1.21.3
  shiki: ^4.0.2

  # Devtools
  "@changesets/cli": ^2.31.0
  "@eslint/js": ^9.39.4
  "@open-pioneer/build-package-cli": ^3.1.0-
  "@open-pioneer/build-support": ^3.1.0
  "@open-pioneer/changesets-release-line": ^0.1.0
  "@open-pioneer/check-pnpm-duplicates": ^0.3.2
  "@open-pioneer/vite-plugin-pioneer": ^6.0.0
  "@testing-library/dom": ^10.4.1
  "@testing-library/jest-dom": ^6.9.1
  "@testing-library/react": ^16.3.2
  "@testing-library/user-event": ^14.6.1
  "@types/js-yaml": ^4.0.9
  "@types/node": ^20.19.41
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  "@typescript-eslint/parser": ^8.59.3
  "@vitejs/plugin-react": "^6.0.2"
  eslint: ^9.39.4
  eslint-config-prettier: ^10.1.8
  eslint-import-resolver-typescript: ^4.4.4
  eslint-plugin-headers: ^1.3.4
  eslint-plugin-import: ^2.32.0
  eslint-plugin-jsx-a11y: ^6.10.2
  eslint-plugin-react: ^7.37.5
  eslint-plugin-react-hooks: ^7.1.1
  eslint-plugin-unused-imports: ^4.4.1
  fast-glob: ^3.3.3
  handlebars: ^4.7.9
  happy-dom: ^20.9.0
  husky: ^9.1.7
  js-yaml: ^4.1.1
  lint-staged: ^17.0.4
  prettier: ^3.8.3
  rimraf: ^6.1.3
  sass: ^1.99.0
  tsx: ^4.22.0
  typedoc: ^0.28.19
  typescript: ^6.0.3
  typescript-eslint: ^8.59.3
  vite: ^8.0.13
  vite-plugin-eslint: ^1.8.1
  vitest: ^4.1.6
  zx: ^8.8.5

overrides:
  # We don't actually use the babel plugin.
  # The babel runtime is also not used as a production dependency.
  # See e.g. https://github.com/emotion-js/emotion/issues/2371
  "@emotion/react>@babel/runtime": "-"
  "@emotion/react>@emotion/babel-plugin": "-"
  "@emotion/styled>@babel/runtime": "-"
  "@emotion/styled>@emotion/babel-plugin": "-"
  "@isaacs/brace-expansion@<=5.0.0": "^5.0.1"

  # Force newer version to avoid printing unnecessary warnings about unsupported browsers in baseline-browser-mapping during development.
  # See https://github.com/web-platform-dx/baseline-browser-mapping/releases/tag/v2.9.0
  "baseline-browser-mapping@<2.9.0": "^2.9.0"
  "csstype@<3.2.3": ">=3.2.3"

  # https://github.com/advisories/GHSA-rf6f-7fwh-wjgh
  "flatted@<=3.4.1": "^3.4.2"

  # https://github.com/advisories/GHSA-5j98-mcp5-4vw2
  "glob@>=10.x <= 11.0.3": "^11.1.0"

  # https://github.com/advisories/GHSA-wf6x-7x77-mvgw
  "immutable@>=5.0.0 <5.1.5": "^5.1.5"

  # https://github.com/advisories/GHSA-38c4-r59v-3vqw
  "markdown-it@>=13.0.0 <14.1.1": "^14.1.1"
  "minimatch@>=10.0.0 <10.2.3": "^10.2.3"

  # https://github.com/advisories/GHSA-7r86-cg39-jmmj
  # https://github.com/advisories/GHSA-23c5-xmqv-rm74
  # https://github.com/advisories/GHSA-3ppc-4f35-3m26
  "minimatch@>=3.0.0 <3.1.4": "^3.1.4"
  "minimatch@>=9.0.0 <9.0.7": "^9.0.9"

  # https://github.com/advisories/GHSA-mw96-cpmx-2vgc
  "rollup@>=2.0.0 <2.80.0": "^2.80.0"
  "rollup@>=4.0.0 <4.59.0": "^4.59.0"

  # https://github.com/advisories/GHSA-3v7f-55p6-f55p
  # https://github.com/advisories/GHSA-c2c7-rcm5-vvqj
  "picomatch@<2.3.2": "^2.3.2"
  "picomatch@>=3.0.0 <3.0.2": "^3.0.2"
  "picomatch@>=4.0.0 <4.0.4": "^4.0.4"

  # https://github.com/advisories/GHSA-48c2-rrv3-qjmp
  "yaml@>=1.0.0 <1.10.3": "^1.10.3"
  "yaml@>=2.0.0 <2.8.3": "^2.8.3"

  # https://github.com/advisories/GHSA-qx2v-qp2m-jg93
  "postcss@<8.5.10": "^8.5.10"

  # Just to get rid of some duplicate dependencies
  "source-map@<0.6.1": ">=0.6.1"
  "stylis@<4.3.5": ">= 4.3.5"

  # Ensure patched packages have the expected version (patch was tested with this version):
  "@ark-ui/react": "5.34.1"
  "@zag-js/splitter": "1.35.3"

allowUnusedPatches: true
patchedDependencies:
  # Currently needed to disable optimization of @open-pioneer/runtime during dev mode.
  # This is ONLY needed in the core packages repository because we're developing the runtime package here.
  # NOTE: This could be an (internal) option in the vite plugin instead.
  "@open-pioneer/vite-plugin-pioneer": patches/@open-pioneer__vite-plugin-pioneer.patch

  # Ensure all portals are mounted under `.pioneer-root` div
  "@ark-ui/react@*": "patches/@ark-ui__react.patch"

  # Fix cursor styling
  "@zag-js/splitter": patches/@zag-js__splitter.patch

  # Fixes 'interact-outside' logic not tabbing between elements within the same shadow dom.
  # Can be removed if https://github.com/chakra-ui/zag/issues/3088 is fixed.
  "@zag-js/interact-outside": patches/@zag-js__interact-outside.patch

peerDependencyRules:
  allowedVersions:
    # No release available for recent react, but they appear to work well enough for sample apps.
    "flux>react": ">=19"
    "react-json-view>react": ">=19"
    "react-json-view>react-dom": ">=19"
    "tsconfck>typescript": "*"

    # See overrides
    "rollup": "*"
    "fdir>picomatch": "*"

auditConfig:
  ignoreGhsas:
    # https://github.com/advisories/GHSA-f886-m6hf-6m8v CVE-2026-33750
    - GHSA-f886-m6hf-6m8v

allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  # Seems to work without build scripts; may revisit later if actually needed.
  core-js: false
  unrs-resolver: false

trustPolicy: no-downgrade
trustPolicyExclude:
  - "@pnpm/lockfile.utils@1004.0.4"
  - "@pnpm/lockfile.fs@1001.1.33"
  - "@pnpm/lockfile.walker@1001.0.27"
  - "@pnpm/lockfile.types@1002.1.1"
  - "@pnpm/lockfile.merger@1001.0.21"
  - "undici-types@6.21.0"
  - "semver@6.3.1"
  - "chokidar@4.0.3"
  - "rollup@2.80.0"
  - "ua-parser-js@1.0.40"

# Install older versions by default
resolutionMode: "lowest-direct"

# Configure a release cooldown
minimumReleaseAge: 4320 # 3 days in minutes
minimumReleaseAgeExclude:
  - "@open-pioneer/*"
  - "@conterra/*"

# Workaround for current problems regarding our vite plugin + vite's optimizeDeps feature
shamefullyHoist: true
strictPeerDependencies: true

# Workspace root itself depends on runtime, and all packages (including runtime) have a dev dependency on workspace root
# for shared scripts.
ignoreWorkspaceCycles: true
linkWorkspacePackages: false
